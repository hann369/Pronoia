<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Inhalt geblockt — Pronoia Safety</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0c0f;
      color: #f0f0ee;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #111417;
      border: 1px solid rgba(226,75,74,0.3);
      border-radius: 20px;
      padding: 3rem;
      max-width: 440px;
      width: 90%;
      text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 1.5rem; }
    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #e24b4a;
      margin-bottom: 0.75rem;
    }
    .reason {
      font-size: 13px;
      color: rgba(240,240,238,0.5);
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }
    .blocked-url {
      font-size: 11px;
      font-family: monospace;
      color: rgba(240,240,238,0.25);
      margin-bottom: 2rem;
      word-break: break-all;
    }
    .btn-back {
      background: #2db87a;
      color: #081a11;
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .footer {
      margin-top: 2rem;
      font-size: 11px;
      color: rgba(240,240,238,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🛡️</div>
    <h1>Zugriff geblockt</h1>
    <p class="reason" id="reason">Diese Seite wurde von Pronoia Safety geblockt.</p>
    <p class="blocked-url" id="url"></p>
    <button class="btn-back" onclick="history.back()">← Zurück zur sicheren Seite</button>
    <div class="footer">
      <span>🛡️</span>
      <span>Pronoia Safety v0.1</span>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const reason = params.get("reason");
    const url = params.get("url");
    if (reason) document.getElementById("reason").textContent = reason;
    if (url) {
      try {
        document.getElementById("url").textContent = new URL(url).hostname;
      } catch {}
    }
  </script>
</body>
</html>
