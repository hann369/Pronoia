<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pronoia Safety</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #0a0c0f;
      color: #f0f0ee;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 1rem;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 1rem;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
      margin-bottom: 1rem;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #2db87a, #1a8a57);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    h1 { font-size: 14px; font-weight: 600; }
    .version { font-size: 11px; color: rgba(240,240,238,0.3); margin-top: 2px; }

    .status-card {
      background: #111417;
      border: 0.5px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      padding: 0.4rem 0;
      border-bottom: 0.5px solid rgba(255,255,255,0.05);
      color: rgba(240,240,238,0.6);
    }

    .status-row:last-child { border-bottom: none; }

    .badge-safe {
      background: rgba(45,184,122,0.12);
      color: #2db87a;
      border: 0.5px solid rgba(45,184,122,0.3);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 10px;
      font-family: monospace;
    }

    .badge-warn {
      background: rgba(239,159,39,0.12);
      color: #ef9f27;
      border: 0.5px solid rgba(239,159,39,0.3);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 10px;
      font-family: monospace;
    }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 0.5px solid rgba(255,255,255,0.05);
    }

    .toggle-row:last-child { border-bottom: none; }

    .toggle-label { font-size: 12px; color: rgba(240,240,238,0.7); }
    .toggle-sub { font-size: 10px; color: rgba(240,240,238,0.3); margin-top: 2px; }

    .toggle {
      position: relative;
      width: 36px; height: 20px;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      transition: 0.2s;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 14px; width: 14px;
      left: 3px; bottom: 3px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      transition: 0.2s;
    }

    input:checked + .slider { background: #2db87a; }
    input:checked + .slider:before {
      transform: translateX(16px);
      background: #fff;
    }

    .log-section { margin-top: 1rem; }
    .log-title {
      font-size: 11px;
      color: rgba(240,240,238,0.3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-family: monospace;
      margin-bottom: 0.5rem;
    }

    .log-item {
      background: #111417;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.4rem;
      font-size: 11px;
    }

    .log-item .log-type {
      font-family: monospace;
      font-size: 10px;
      margin-bottom: 2px;
    }

    .log-item .log-url {
      color: rgba(240,240,238,0.35);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .scan-btn {
      width: 100%;
      background: rgba(45,184,122,0.1);
      color: #2db87a;
      border: 0.5px solid rgba(45,184,122,0.3);
      padding: 0.6rem;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.75rem;
    }

    .scan-btn:hover { background: rgba(45,184,122,0.18); }

    #scan-result {
      font-size: 11px;
      text-align: center;
      color: rgba(240,240,238,0.4);
      margin-top: 0.5rem;
      min-height: 16px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-icon">🛡️</div>
  <div>
    <h1>Pronoia Safety</h1>
    <div class="version">v0.1.0 — MVP</div>
  </div>
</header>

<div class="status-card" id="current-status">
  <div class="status-row">
    <span>Aktuelle Seite</span>
    <span id="current-url" class="badge-safe">lädt...</span>
  </div>
  <div class="status-row">
    <span>Adult-Domain</span>
    <span id="s-adult" class="badge-safe">—</span>
  </div>
  <div class="status-row">
    <span>Keyword-Flag</span>
    <span id="s-keyword" class="badge-safe">—</span>
  </div>
  <div class="status-row">
    <span>Community-Risiko</span>
    <span id="s-community" class="badge-safe">—</span>
  </div>
</div>

<div class="status-card">
  <div class="toggle-row">
    <div>
      <div class="toggle-label">Schutz aktiv</div>
      <div class="toggle-sub">Alle Filter ein-/ausschalten</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="t-enabled" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="toggle-row">
    <div>
      <div class="toggle-label">Adult Sites blocken</div>
      <div class="toggle-sub">Pornografische Domains</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="t-adult" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="toggle-row">
    <div>
      <div class="toggle-label">Community Scanner</div>
      <div class="toggle-sub">Discord, Reddit, Telegram</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="t-community" checked>
      <span class="slider"></span>
    </label>
  </div>
</div>

<button class="scan-btn" id="scan-now">↻ Aktuelle Seite scannen</button>
<div id="scan-result"></div>

<div class="log-section">
  <div class="log-title">// Letzte Ereignisse</div>
  <div id="log-entries">
    <div style="font-size:11px; color: rgba(240,240,238,0.25); text-align:center; padding: 0.5rem;">Noch keine Einträge</div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
