<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pronoia | Knowledge Vault</title>
  <meta name="description" content="Pronoia Knowledge Vault — Spatial intelligence, file ingestion, and creative context for the agentic workflow.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --font-body: 'DM Sans', sans-serif;
      --font-display: 'DM Serif Display', serif;
      --font-accent: 'Cormorant Garamond', serif;
      --font-mono: 'JetBrains Mono', monospace;

      --tan: #d5b893;
      --coffee: #6f4d38;
      --caput: #632024;
      --gold: #d4a574;
      --cobalt: #0047AB;
      --cobalt-bright: #1A6AFF;
      --cobalt-dim: rgba(0, 71, 171, 0.12);
      
      /* Theme Variables - Default Light */
      --bg: #fdfbf9;
      --bg2: #f7f3ef;
      --bg3: #eeeae4;
      --bg-panel: #f7f3ef;
      --bg-card: #ffffff;
      --card-bg: rgba(255, 255, 255, 0.85);
      --bg-elevated: #eeeae4;
      --text: #25344f;
      --text2: #617891;
      --text3: #94A3B8;
      --border: rgba(213, 184, 147, 0.18);
      --border-strong: rgba(213, 184, 147, 0.35);
      --border-s: var(--border-strong);

      /* Accents */
      --cobalt-glow: rgba(26, 106, 255, 0.18);
      --tan-dim: rgba(213, 184, 147, 0.12);
      --green: #00C48C;
      --green-dim: rgba(0, 196, 140, 0.1);
      --amber: #F5A623;
      --amber-dim: rgba(245, 166, 35, 0.1);
      --red: #FF4D4D;
      --red-dim: rgba(255, 77, 77, 0.1);

      --transition-theme: background 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
      --nav-bg: rgba(253, 251, 249, 0.9);
      --nav-text: #25344f;
    }

    body.dark-theme {
      --bg: #0a0a0a;
      --bg2: #141414;
      --bg3: #1a1a1a;
      --bg-panel: #0D1219;
      --bg-card: #111820;
      --card-bg: rgba(20, 20, 20, 0.9);
      --bg-elevated: #161E28;
      --text: #fdfbf9;
      --text2: #a0a0a0;
      --text3: #3A5070;
      --border: rgba(213, 184, 147, 0.1);
      --border-strong: rgba(213, 184, 147, 0.2);
      --border-s: var(--border-strong);

      --cobalt-dim: rgba(0, 71, 171, 0.12);
      --cobalt-glow: rgba(26, 106, 255, 0.18);
      --nav-bg: rgba(10, 10, 10, 0.9);
      --nav-text: #fdfbf9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      overflow-x: hidden;
      background: transparent;
    }

    /* GLOBAL SKY — fixed behind everything */
    #sky-global {
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events: none;
    }

    /* GRAIN (Subtle) */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9998;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .gradient-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: -2;
      overflow: hidden;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      width: 60vw; height: 60vw;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      animation: orb-float 20s infinite alternate;
    }

    .orb-1 {
      background: var(--tan);
      top: -10%; right: -10%;
    }

    .orb-2 {
      background: var(--cobalt);
      bottom: -10%; left: -10%;
      animation-delay: -5s;
    }

    @keyframes orb-float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(10vw, 15vh) scale(1.1); }
      100% { transform: translate(-5vw, -10vh) scale(0.9); }
    }

    /* ═══════════════════════════════════════════════
       UNIFIED HEADER
    ═══════════════════════════════════════════════ */
    #header {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      padding: 1.6rem 5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      background: transparent;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      color: var(--nav-text);
    }

    #header.scrolled {
      background: var(--nav-bg);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      border-bottom: 1px solid var(--border);
      padding: 1.1rem 5rem;
    }

    .nav-left { display: flex; align-items: center; gap: 3rem; }
    
    .nav-logo {
      height: 24px;
      width: auto;
      transition: filter 0.5s;
    }
    body.dark-theme .nav-logo { filter: invert(1); }

    .session-badge {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem 1.2rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 100px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--text2);
    }

    .pulse {
      width: 6px; height: 6px;
      background: var(--green, #00C48C);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0.4; transform: scale(1); }
    }

    .nav-right { display: flex; align-items: center; gap: 4rem; }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 3rem;
    }

    .nav-links a {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text2);
      text-decoration: none;
      transition: color 0.3s;
    }

    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--tan); }

    /* Theme Toggle */
    .theme-toggle-container {
      display: flex;
      align-items: center;
    }

    .theme-toggle {
      background: transparent;
      border: 1px solid var(--border-strong);
      color: var(--text);
      padding: 0.5rem 1.2rem;
      border-radius: 100px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      transition: all 0.3s;
    }

    .theme-toggle:hover {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }


    /* ═══ MAIN ═══════════════════════════════════════ */
    #main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 10rem 3rem 6rem;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    .vault-header {
      margin-bottom: 5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 4rem;
    }

    .vault-title h1 {
      font-family: var(--font-display);
      font-size: 5rem;
      font-weight: 400;
      line-height: 1;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    .vault-title p {
      color: var(--text2);
      font-size: 1.15rem;
      max-width: 600px;
      line-height: 1.8;
    }

    .stat-box {
      text-align: left;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      padding: 2rem;
      border-radius: 24px;
      min-width: 180px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.03);
    }

    .stat-num {
      font-family: var(--font-display); 
      font-size: 3rem;
      font-weight: 400; 
      color: var(--tan);
      line-height: 1;
    }

    .stat-label {
      font-family: var(--font-mono); font-size: .65rem;
      color: var(--text3); text-transform: uppercase; letter-spacing: .2em;
      margin-top: 0.5rem;
    }

    /* ═══ INGESTION ZONE ════════════════════════════ */
    #ingest-zone {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-strong);
      padding: 5rem 3rem;
      border-radius: 32px;
      text-align: center;
      transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
      margin-bottom: 5rem;
      cursor: pointer;
      position: relative;
      box-shadow: 0 30px 60px rgba(0,0,0,0.05);
    }

    #ingest-zone:hover, #ingest-zone.dragover {
      transform: translateY(-5px);
      border-color: var(--tan);
      background: rgba(213, 184, 147, 0.05);
    }

    .ingest-icon { 
      font-size: 3rem; 
      margin-bottom: 1.5rem; 
      color: var(--tan);
    }

    .ingest-text {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .ingest-subtext { 
      font-size: 1.1rem; 
      color: var(--text2);
      opacity: 0.8;
    }

    /* ═══ INPUT FORM ════════════════════════════════ */
    #ingest-form {
      display: none;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      padding: 4rem;
      border: 1px solid var(--border-strong);
      border-radius: 32px;
      margin-bottom: 5rem;
      box-shadow: 0 40px 80px rgba(0,0,0,0.1);
    }

    .form-group { margin-bottom: 2.5rem; }

    .form-label {
      font-family: var(--font-mono); font-size: .75rem;
      color: var(--text3); text-transform: uppercase;
      letter-spacing: 0.2em; display: block; margin-bottom: 1rem;
    }

    .form-input {
      width: 100%; 
      background: var(--bg2);
      border: 1px solid var(--border); 
      color: var(--text);
      padding: 1.2rem 1.5rem; 
      font-family: var(--font-body);
      font-size: 1.1rem; 
      border-radius: 12px; 
      outline: none;
      transition: all 0.3s;
    }

    .form-input:focus { 
      border-color: var(--tan); 
      background: var(--white);
    }

    textarea.form-input { resize: vertical; min-height: 160px; }

    .btn-primary {
      background: var(--text); 
      color: var(--bg); 
      border: none;
      padding: 1.2rem 3rem; 
      font-family: var(--font-body);
      font-size: 0.9rem; 
      font-weight: 600; 
      text-transform: uppercase;
      letter-spacing: 0.15em; 
      cursor: pointer; 
      border-radius: 100px;
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }
    .btn-primary:hover { 
      transform: translateY(-3px); 
      box-shadow: 0 15px 30px rgba(0,0,0,0.1); 
    }

    .btn-ghost {
      background: transparent; 
      border: 1px solid var(--border-strong);
      color: var(--text2); 
      padding: 1.2rem 2.5rem;
      font-family: var(--font-body); 
      font-size: 0.9rem;
      text-transform: uppercase; 
      letter-spacing: 0.15em;
      cursor: pointer; 
      border-radius: 100px; 
      transition: all 0.3s;
    }
    .btn-ghost:hover { 
      background: var(--bg3); 
      color: var(--text); 
    }

    /* ═══ VAULT GRID ═══════════════════════════════ */
    .vault-section-label {
      font-family: var(--font-display); 
      font-size: 2.2rem; 
      color: var(--text);
      margin-bottom: 2.5rem;
      display: flex; 
      align-items: center; 
      gap: 2rem;
    }
    .vault-section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .vault-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 2rem;
    }

    .vault-item {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem;
      transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.02);
    }

    .vault-item:hover {
      transform: translateY(-8px);
      border-color: var(--tan);
      box-shadow: 0 30px 60px rgba(0,0,0,0.06);
    }

    .item-type-badge {
      font-family: var(--font-mono); font-size: .6rem;
      color: var(--tan); text-transform: uppercase;
      letter-spacing: 0.2em; margin-bottom: 1.5rem;
      border: 1px solid var(--tan);
      padding: .3rem .8rem;
      border-radius: 100px;
      display: inline-block;
      width: fit-content;
    }

    .item-title {
      font-family: var(--font-display);
      font-size: 1.8rem; 
      font-weight: 400; 
      color: var(--text);
      margin-bottom: 1rem; 
      line-height: 1.2;
    }

    .item-content {
      font-size: 1rem; 
      color: var(--text2); 
      flex: 1;
      display: -webkit-box; 
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical; 
      overflow: hidden;
      line-height: 1.7;
    }

    .item-meta {
      margin-top: 2rem; 
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      font-family: var(--font-mono); 
      font-size: .65rem; 
      color: var(--text3);
      letter-spacing: 0.1em;
    }

    .item-delete {
      background: transparent; 
      border: 1px solid transparent; 
      color: var(--text3);
      cursor: pointer; 
      padding: 0.4rem 0.8rem;
      border-radius: 100px; 
      transition: all 0.3s;
    }
    .item-delete:hover { 
      border-color: #ff4444;
      color: #ff4444; 
    }


    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ═══ RESPONSIVE ════════════════════════════════ */
    @media (max-width: 768px) {
      #main { padding: 2rem 1.5rem; }
      .vault-title h1 { font-size: 2.5rem; }
      .vault-header { flex-direction: column; align-items: flex-start; }
      .vault-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

  <canvas id="sky-global"></canvas>

  <div class="gradient-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div id="pronoia-nav-container"></div>


  <main id="main">
    <div class="vault-header">
      <div class="vault-title">
        <h1>Context Canvas</h1>
        <p>Your intelligent spatial storage for ideas, research, and media. The Pronoia Agent references this vault to optimize your protocols.</p>
      </div>
      <div class="vault-stats">
        <div class="stat-box">
          <div class="stat-num" id="stat-total">—</div>
          <div class="stat-label">Items</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="stat-recent">—</div>
          <div class="stat-label">This Week</div>
        </div>
      </div>
    </div>

    <div id="ingest-zone">
      <div class="ingest-icon">✦</div>
      <div class="ingest-text">Drop files, links, or research here</div>
      <div class="ingest-subtext">or click to manually ingest into the vault</div>
      <div style="margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: center;">
        <button id="uploadTrigger" class="btn-ghost" style="padding: 0.5rem 1rem; font-size: 0.6rem;">Upload File</button>
        <button id="manualTrigger" class="btn-ghost" style="padding: 0.5rem 1rem; font-size: 0.6rem;">Manual Note</button>
      </div>
      <input type="file" id="directFile" style="display:none;" multiple>
    </div>



    <div id="ingest-form">
      <div class="form-group">
        <label class="form-label">Type</label>
        <select id="itemType" class="form-input">
          <option value="note">Text / Note</option>
          <option value="link">Web Link</option>
          <option value="youtube">YouTube Video</option>
          <option value="file">Local File</option>
        </select>
      </div>
      <div id="file-input-group" class="form-group" style="display: none;">
        <label class="form-label">Upload File</label>
        <input type="file" id="itemFile" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Title</label>
        <input type="text" id="itemTitle" class="form-input" placeholder="Give this context a name">
      </div>
      <div id="content-input-group" class="form-group">
        <label class="form-label">Content / URL</label>
        <textarea id="itemContent" class="form-input" placeholder="Paste your link, thoughts, or raw text..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Tags (comma separated)</label>
        <input type="text" id="itemTags" class="form-input" placeholder="e.g. research, neuroscience, protocol">
      </div>
      <div class="form-actions">
        <button id="saveItemBtn" class="btn-primary">Ingest into Vault</button>
        <button id="cancelItemBtn" class="btn-ghost">Cancel</button>
      </div>
    </div>

    <div class="vault-section-label" id="grid-label">Stored Context</div>
    <div class="vault-grid" id="vault-grid"></div>
  </main>

  <script>
    // ThemeEngine and Global Clock moved to core.js

    // ═══ SUPABASE CONFIG ═══
    const supabaseUrl = 'https://mbtjwtrlfapievmfrisu.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1idGp3dHJsZmFwaWV2bWZyaXN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODg5NjIsImV4cCI6MjA5MDI2NDk2Mn0.mIKwAP4CRzrT4cjjkwOOfzke7nY4MddxOzDI_thNUqE';
    const sb = window.supabase.createClient(supabaseUrl, supabaseKey);

    const MOCK_USER_ID = 'local-user-123';

    // ═══ UI ELEMENTS ═══
    const ingestZone = document.getElementById('ingest-zone');
    const ingestForm = document.getElementById('ingest-form');
    const saveItemBtn = document.getElementById('saveItemBtn');
    const cancelItemBtn = document.getElementById('cancelItemBtn');
    const vaultGrid = document.getElementById('vault-grid');

    // ═══ TOAST NOTIFICATION ═══
    function showToast(msg, type = 'success') {
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(20px)'; setTimeout(() => t.remove(), 300); }, 3000);
    }

    // Extra ThemeEngine block removed


    // ═══ FORM INTERACTIONS ═══
    const uploadTrigger = document.getElementById('uploadTrigger');
    const manualTrigger = document.getElementById('manualTrigger');
    const directFile = document.getElementById('directFile');

    uploadTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      directFile.click();
    });

    manualTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      ingestZone.style.display = 'none';
      ingestForm.style.display = 'block';
      document.getElementById('itemTitle').focus();
    });

    directFile.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFiles(e.target.files);
      }
    });

    ingestZone.addEventListener('click', (e) => {
      // Default behavior if clicking background
      if (e.target === ingestZone || e.target.classList.contains('ingest-text') || e.target.classList.contains('ingest-icon')) {
          ingestZone.style.display = 'none';
          ingestForm.style.display = 'block';
          document.getElementById('itemTitle').focus();
      }
    });



    document.getElementById('itemType').addEventListener('change', (e) => {
      const isFile = e.target.value === 'file';
      document.getElementById('file-input-group').style.display = isFile ? 'block' : 'none';
      document.getElementById('content-input-group').style.display = isFile ? 'none' : 'block';
      
      if (isFile) {
        document.getElementById('itemTitle').placeholder = 'Filename (Auto-filled)';
      } else {
        document.getElementById('itemTitle').placeholder = 'Give this context a name';
      }
    });

    document.getElementById('itemFile').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        document.getElementById('itemTitle').value = file.name;
      }
    });

    // Drag and drop
    ingestZone.addEventListener('dragover', (e) => { e.preventDefault(); ingestZone.classList.add('dragover'); });
    ingestZone.addEventListener('dragleave', () => ingestZone.classList.remove('dragover'));
    ingestZone.addEventListener('drop', (e) => {
      e.preventDefault();
      ingestZone.classList.remove('dragover');
      
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        // Direct file ingest
        handleFiles(files);
        return;
      }

      const text = e.dataTransfer.getData('text/plain');
      if (text) {
        ingestZone.style.display = 'none';
        ingestForm.style.display = 'block';
        document.getElementById('itemContent').value = text;
        if (text.startsWith('http')) {
          document.getElementById('itemType').value = text.includes('youtube.com') || text.includes('youtu.be') ? 'youtube' : 'link';
        }
      }
    });

    async function handleFiles(files) {
        showToast(`Preparing ${files.length} file(s)...`);
        for (const file of Array.from(files)) {
            const isText = file.type.startsWith('text/') || file.name.endsWith('.md') || file.name.endsWith('.js') || file.name.endsWith('.html');
            const content = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                if (isText) reader.readAsText(file);
                else reader.readAsDataURL(file);
            });

            let finalContent = content;
            if (finalContent.length > 50000) finalContent = finalContent.substring(0, 50000);

            const { error } = await sb.from('vault_items').insert([{
                user_id: MOCK_USER_ID,
                type: 'file',
                title: file.name,
                content: finalContent,
                tags: ['ingested', 'file-drop'],
                created_at: new Date().toISOString()
            }]);

            if (error) showToast(`Error uploading ${file.name}`, 'error');
            else showToast(`Ingested ${file.name}`);
        }
        fetchVaultItems();
    }


    cancelItemBtn.addEventListener('click', () => {
      ingestForm.style.display = 'none';
      ingestZone.style.display = 'block';
      clearForm();
    });

    saveItemBtn.addEventListener('click', async () => {
      const type = document.getElementById('itemType').value;
      const title = document.getElementById('itemTitle').value.trim();
      const contentInput = document.getElementById('itemContent').value.trim();
      const tagsRaw = document.getElementById('itemTags').value.trim();
      const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
      const fileInput = document.getElementById('itemFile');

      if (!title || (type !== 'file' && !contentInput)) { 
        showToast('Please provide a title and content.', 'error'); 
        return; 
      }

      saveItemBtn.textContent = 'Ingesting...';
      saveItemBtn.disabled = true;

      let finalContent = contentInput;
      let url = (type === 'link' || type === 'youtube') ? contentInput : null;

      if (type === 'file' && fileInput.files.length > 0) {
        const file = fileInput.files[0];
        // Read file as text if it's a text file, else as data URL
        const isText = file.type.startsWith('text/') || file.name.endsWith('.md') || file.name.endsWith('.js') || file.name.endsWith('.html');
        
        const fileContent = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (e) => resolve(e.target.result);
          if (isText) reader.readAsText(file);
          else reader.readAsDataURL(file);
        });
        
        finalContent = fileContent;
        if (finalContent.length > 50000) {
          showToast('File too large. Truncating to 50KB.', 'error');
          finalContent = finalContent.substring(0, 50000);
        }
      }

      const { data, error } = await sb
        .from('vault_items')
        .insert([{ user_id: MOCK_USER_ID, type, title, content: finalContent, url, tags }])
        .select();

      if (error) {
        console.error('Supabase error:', error);
        showToast('Failed to ingest: ' + error.message, 'error');
      } else {
        showToast('Context ingested successfully.');
        clearForm();
        ingestForm.style.display = 'none';
        ingestZone.style.display = 'block';
        fetchVaultItems();
      }

      saveItemBtn.textContent = 'Ingest into Vault';
      saveItemBtn.disabled = false;
    });

    function clearForm() {
      document.getElementById('itemTitle').value = '';
      document.getElementById('itemContent').value = '';
      document.getElementById('itemTags').value = '';
      document.getElementById('itemType').value = 'note';
    }

    // ═══ FETCH & RENDER ═══
    async function fetchVaultItems() {
      vaultGrid.innerHTML = '<div class="empty-state"><div class="empty-icon">◎</div><p>Syncing with spatial database...</p></div>';

      const { data, error } = await sb
        .from('vault_items')
        .select('*')
        .eq('user_id', MOCK_USER_ID)
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Fetch error:', error);
        vaultGrid.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠</div><p>Connection error: ${error.message}</p></div>`;
        return;
      }

      // Update stats
      document.getElementById('stat-total').textContent = data.length;
      const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
      document.getElementById('stat-recent').textContent = data.filter(i => new Date(i.created_at) > weekAgo).length;

      if (data.length === 0) {
        vaultGrid.innerHTML = '<div class="empty-state"><div class="empty-icon">✦</div><p>Your vault is empty. Click the ingestion zone above to add your first piece of context.</p></div>';
        return;
      }

      vaultGrid.innerHTML = '';
      data.forEach(item => {
        const date = new Date(item.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        const typeClass = item.type === 'link' ? 'type-link' : item.type === 'youtube' ? 'type-youtube' : '';

        const card = document.createElement('div');
        card.className = 'vault-item';
        card.innerHTML = `
          <div class="item-type-badge ${typeClass}">${item.type}</div>
          <div class="item-title">${escapeHtml(item.title)}</div>
          <div class="item-content">${escapeHtml(item.content)}</div>
          <div class="item-meta">
            <span>${date}</span>
            <button class="item-delete" onclick="deleteItem('${item.id}')" title="Remove">✕ Remove</button>
          </div>
        `;
        vaultGrid.appendChild(card);
      });

      gsap.from('.vault-item', {
        y: 20, opacity: 0, duration: 0.5,
        stagger: 0.06, ease: 'power2.out'
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    async function deleteItem(id) {
      if (!confirm('Remove this item from the vault?')) return;
      const { error } = await sb.from('vault_items').delete().eq('id', id);
      if (error) { showToast('Failed to delete.', 'error'); return; }
      showToast('Item removed.');
      fetchVaultItems();
    }

    // ═══ INIT ═══
    fetchVaultItems();

    // Page load animation
    gsap.from('.vault-title h1', { y: 30, opacity: 0, duration: 0.8, ease: 'power3.out' });
    gsap.from('.vault-title p', { y: 20, opacity: 0, duration: 0.8, delay: 0.1, ease: 'power3.out' });
    gsap.from('.stat-box', { y: 20, opacity: 0, duration: 0.6, delay: 0.2, stagger: 0.1, ease: 'power2.out' });
    gsap.from('#ingest-zone', { y: 20, opacity: 0, duration: 0.6, delay: 0.35, ease: 'power2.out' });
  </script>
  <script src="core.js"></script>
</body>
</html>
