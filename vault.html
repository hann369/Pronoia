<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pronoia | Knowledge Vault</title>
  <meta name="description" content="Pronoia Knowledge Vault — Spatial intelligence, file ingestion, and creative context for the agentic workflow.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --font-body: 'DM Sans', sans-serif;
      --font-display: 'DM Serif Display', serif;
      --font-accent: 'Cormorant Garamond', serif;
      --font-mono: 'JetBrains Mono', monospace;

      /* Dark Theme Tokens */
      --bg: #080C12;
      --bg-panel: #0D1219;
      --bg-card: #111820;
      --bg-elevated: #161E28;
      --text: #E8EDF5;
      --text2: #5A7090;
      --text3: #3A5070;
      --border: rgba(255, 255, 255, 0.06);
      --border-s: rgba(255, 255, 255, 0.1);

      /* Accents */
      --cobalt: #0047AB;
      --cobalt-bright: #1A6AFF;
      --cobalt-dim: rgba(0, 71, 171, 0.12);
      --tan: #d5b893;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ═══ HEADER ════════════════════════════════════ */
    #header {
      height: 52px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      z-index: 50;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .brand-link {
      font-weight: 700;
      font-size: .9rem;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -.02em;
    }

    .brand-link span {
      color: var(--cobalt-bright);
    }

    .header-nav a {
      font-family: var(--font-mono);
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .15em;
      color: var(--text2);
      text-decoration: none;
      transition: color .2s;
      margin-left: 1.2rem;
    }

    .header-nav a:hover,
    .header-nav a.active {
      color: var(--text);
    }

    .stage-badge {
      font-family: var(--font-mono);
      font-size: .6rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      padding: .18rem .6rem;
      border: 1px solid var(--tan);
      color: var(--tan);
      background: rgba(213, 184, 147, 0.05);
    }

    /* ═══ MAIN LAYOUT ═══════════════════════════════ */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 3rem 6rem;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    .vault-header {
      margin-bottom: 3rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .vault-title h1 {
      font-family: var(--font-display);
      font-size: 4rem;
      font-weight: 400;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .vault-title p {
      color: var(--text2);
      font-size: 1rem;
      max-width: 500px;
    }

    /* ═══ INGESTION ZONE ════════════════════════════ */
    #ingest-zone {
      background: var(--bg-panel);
      border: 1px dashed var(--border-s);
      padding: 3rem;
      border-radius: 8px;
      text-align: center;
      transition: all 0.3s ease;
      margin-bottom: 3rem;
      cursor: pointer;
      position: relative;
    }

    #ingest-zone:hover, #ingest-zone.dragover {
      border-color: var(--cobalt-bright);
      background: var(--cobalt-dim);
    }

    .ingest-icon {
      font-size: 2rem;
      color: var(--text3);
      margin-bottom: 1rem;
    }

    .ingest-text {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    .ingest-subtext {
      font-size: 0.85rem;
      color: var(--text2);
    }

    /* ═══ INPUT FORM (Hidden initially) ═════════════ */
    #ingest-form {
      display: none;
      background: var(--bg-card);
      padding: 2rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 3rem;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: block;
      margin-bottom: 0.5rem;
    }

    .form-input {
      width: 100%;
      background: var(--bg-panel);
      border: 1px solid var(--border-s);
      color: var(--text);
      padding: 0.8rem 1rem;
      font-family: var(--font-body);
      font-size: 0.95rem;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.3s;
    }

    .form-input:focus {
      border-color: var(--cobalt-bright);
    }

    textarea.form-input {
      resize: vertical;
      min-height: 100px;
    }

    .btn {
      background: var(--tan);
      color: #000;
      border: none;
      padding: 0.8rem 2rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s;
    }

    .btn:hover {
      background: #fff;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-s);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: var(--border-s);
      color: #fff;
    }

    .form-actions {
      display: flex;
      gap: 1rem;
    }

    /* ═══ CANVAS GRID ═══════════════════════════════ */
    .vault-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
    }

    .vault-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .vault-item:hover {
      transform: translateY(-5px);
      border-color: var(--border-s);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .item-type {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      color: var(--tan);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 1rem;
    }

    .item-title {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }

    .item-content {
      font-size: 0.85rem;
      color: var(--text2);
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item-meta {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--text3);
    }

    /* ═══ EMPTY STATE ═══════════════════════════════ */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text3);
      grid-column: 1 / -1;
    }

  </style>
</head>

<body>

  <header id="header">
    <div class="header-left">
      <a href="index.html" class="brand-link">PRONOIA<span>.</span></a>
      <div class="stage-badge">KNOWLEDGE VAULT</div>
    </div>
    <div class="header-right header-nav">
      <a href="protocol.html">Protocol</a>
      <a href="vault.html" class="active">Vault</a>
    </div>
  </header>

  <main id="main">
    <div class="vault-header">
      <div class="vault-title">
        <h1>Context Canvas</h1>
        <p>The intelligent spatial storage for your ideas, research, and media. The Pronoia Agent references this vault to optimize your workflows.</p>
      </div>
    </div>

    <div id="ingest-zone">
      <div class="ingest-icon">✧</div>
      <div class="ingest-text">Drop links, notes, or research here</div>
      <div class="ingest-subtext">or click to manually ingest into the vault</div>
    </div>

    <div id="ingest-form">
      <div class="form-group">
        <label class="form-label">Type</label>
        <select id="itemType" class="form-input" style="appearance: none;">
          <option value="note">Text / Note</option>
          <option value="link">Web Link</option>
          <option value="youtube">YouTube Video</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Title</label>
        <input type="text" id="itemTitle" class="form-input" placeholder="Give this context a name">
      </div>
      <div class="form-group">
        <label class="form-label">Content / URL</label>
        <textarea id="itemContent" class="form-input" placeholder="Paste your link, thoughts, or raw text..."></textarea>
      </div>
      <div class="form-actions">
        <button id="saveItemBtn" class="btn">Ingest into Vault</button>
        <button id="cancelItemBtn" class="btn btn-secondary">Cancel</button>
      </div>
    </div>

    <div class="vault-grid" id="vault-grid">
      <!-- Items will be loaded here -->
    </div>
  </main>

  <script>
    // Supabase Configuration
    const supabaseUrl = 'https://mbtjwtrlfapievmfrisu.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1idGp3dHJsZmFwaWV2bWZyaXN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODg5NjIsImV4cCI6MjA5MDI2NDk2Mn0.mIKwAP4CRzrT4cjjkwOOfzke7nY4MddxOzDI_thNUqE';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // Default user ID for demonstration (since Firebase Auth handles actual auth in the app)
    const MOCK_USER_ID = 'local-user-123';

    // UI Elements
    const ingestZone = document.getElementById('ingest-zone');
    const ingestForm = document.getElementById('ingest-form');
    const saveItemBtn = document.getElementById('saveItemBtn');
    const cancelItemBtn = document.getElementById('cancelItemBtn');
    const vaultGrid = document.getElementById('vault-grid');

    // UI Interactions
    ingestZone.addEventListener('click', () => {
      ingestZone.style.display = 'none';
      ingestForm.style.display = 'block';
    });

    cancelItemBtn.addEventListener('click', () => {
      ingestForm.style.display = 'none';
      ingestZone.style.display = 'block';
      clearForm();
    });

    saveItemBtn.addEventListener('click', async () => {
      const type = document.getElementById('itemType').value;
      const title = document.getElementById('itemTitle').value;
      const content = document.getElementById('itemContent').value;

      if (!title || !content) return alert('Please provide a title and content.');

      saveItemBtn.textContent = 'Ingesting...';
      
      const { data, error } = await supabase
        .from('vault_items')
        .insert([
          { user_id: MOCK_USER_ID, type, title, content }
        ]);

      if (error) {
        console.error('Error inserting item:', error);
        alert('Failed to ingest item.');
      } else {
        clearForm();
        ingestForm.style.display = 'none';
        ingestZone.style.display = 'block';
        fetchVaultItems();
      }
      
      saveItemBtn.textContent = 'Ingest into Vault';
    });

    function clearForm() {
      document.getElementById('itemTitle').value = '';
      document.getElementById('itemContent').value = '';
    }

    // Fetch and Display Items
    async function fetchVaultItems() {
      vaultGrid.innerHTML = '<div class="empty-state">Syncing with spatial database...</div>';
      
      const { data, error } = await supabase
        .from('vault_items')
        .select('*')
        .eq('user_id', MOCK_USER_ID)
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Error fetching vault items:', error);
        vaultGrid.innerHTML = '<div class="empty-state">Error loading context.</div>';
        return;
      }

      if (data.length === 0) {
        vaultGrid.innerHTML = '<div class="empty-state">Your vault is empty. Drop some context above to begin.</div>';
        return;
      }

      vaultGrid.innerHTML = '';
      data.forEach(item => {
        const date = new Date(item.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        
        const card = document.createElement('div');
        card.className = 'vault-item';
        card.innerHTML = `
          <div class="item-type">${item.type}</div>
          <div class="item-title">${item.title}</div>
          <div class="item-content">${item.content}</div>
          <div class="item-meta">
            <span>Ingested</span>
            <span>${date}</span>
          </div>
        `;
        vaultGrid.appendChild(card);
      });

      // Animate entry
      gsap.from('.vault-item', {
        y: 20,
        opacity: 0,
        duration: 0.6,
        stagger: 0.05,
        ease: 'power2.out'
      });
    }

    // Init
    fetchVaultItems();

  </script>
</body>
</html>
