name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Lint is reported but non-blocking: the codebase has pre-existing
      # react-hooks rule violations (strict Next 16 ruleset) to be cleaned up
      # separately. Tests + build are the hard gates.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Dummy public Firebase config so the client SDK initializes during
          # the build instead of mock mode. No secrets needed for a build.
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-dummy-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-project
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:0:web:ci"
